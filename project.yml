name: WidgetRPG
options:
  bundleIdPrefix: com.shota
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    # 実機ビルド用の署名。Team IDは Signing.xcconfig で上書きできる
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
targets:
  WidgetRPG:
    type: application
    platform: iOS
    sources:
      - path: WidgetRPG
      - path: Shared
    info:
      path: WidgetRPG/Info.plist
      properties:
        CFBundleDisplayName: ウィジェットRPG
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
    entitlements:
      path: WidgetRPG/WidgetRPG.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.shota.widgetrpg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shota.WidgetRPG
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: WidgetRPGWidget
        embed: true
  WidgetRPGWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WidgetRPGWidget
      - path: Shared
    info:
      path: WidgetRPGWidget/Info.plist
      properties:
        CFBundleDisplayName: ウィジェットRPG
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WidgetRPGWidget/WidgetRPGWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.shota.widgetrpg
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shota.WidgetRPG.Widget
        SKIP_INSTALL: true
        # ウィジェット拡張はアプリアイコンを持たない(共有スプライトカタログのみ内包)
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
